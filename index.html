<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q&A Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#1a0533 0%,#0d1b4b 100%);font-family:'Helvetica Neue',sans-serif;color:#fff}
  header{background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .logo{font-size:20px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:rgba(255,255,255,.1);color:#fff;transition:all .2s}
  .tab.active{background:linear-gradient(90deg,#7c3aed,#2563eb)}
  .container{padding:0 16px 60px;max-width:720px;margin:0 auto}
  .card{background:rgba(255,255,255,.06);border-radius:16px;padding:20px;margin:16px 0;border:1px solid rgba(255,255,255,.1)}
  h2{font-size:19px;margin-bottom:16px}
  input,textarea{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;font-family:inherit}
  textarea{resize:vertical;min-height:100px}
  input::placeholder,textarea::placeholder{color:#888}
  .check-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;font-size:14px}
  .check-row input[type=checkbox]{width:18px;height:18px;accent-color:#7c3aed;cursor:pointer}
  .btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:linear-gradient(90deg,#7c3aed,#2563eb);color:#fff;transition:opacity .2s}
  .btn:disabled{opacity:.4;cursor:default}
  .btn-sm{padding:4px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:12px}
  .btn-danger{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1)}
  .btn-success{border-color:#34d399;color:#34d399;background:rgba(52,211,153,.1)}
  .counter{text-align:right;font-size:12px;color:#888;margin-bottom:10px}
  .success-msg{background:rgba(52,211,153,.15);border:1px solid #34d399;border-radius:10px;padding:10px 14px;margin-bottom:12px;color:#34d399;font-weight:600;display:none}
  .success-msg.show{display:block}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;align-items:center}
  .filter-right{margin-left:auto;font-size:13px;color:#a78bfa}
  .q-card{border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06)}
  .q-card.answered{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.3)}
  .q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(124,58,237,.3);color:#a78bfa}
  .badge.answered{background:rgba(52,211,153,.2);color:#34d399}
  .q-time{font-size:12px;color:#888}
  .q-text{font-size:16px;line-height:1.6;margin:8px 0}
  .q-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .q-author{font-size:13px;color:#a78bfa}
  .like-btn{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#aaa;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
  .like-btn.liked{border-color:#f472b6;background:rgba(244,114,182,.15);color:#f472b6;cursor:default}
  .admin-actions{display:flex;gap:6px}
  .empty{text-align:center;color:#888;padding:50px 0;font-size:15px}
  .qr-section{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:10px}
  #qrcode canvas,#qrcode img{border-radius:8px;border:4px solid #fff}
  .section{display:none}
  .section.active{display:block}
  .error-msg{color:#f87171;font-size:13px;margin-top:6px}
  .admin-header{display:flex;justify-content:space-between;align-items:center;margin:16px 0}
  .mb10{margin-bottom:10px}
  .mb12{margin-bottom:12px}
  .loading{text-align:center;color:#888;padding:30px;font-size:14px}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="logo">✨ Q&A Live</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('submit',this)">質問する</button>
    <button class="tab" id="tab-board" onclick="switchTab('board',this)">ボード (0)</button>
    <button class="tab" onclick="switchTab('admin',this)">管理</button>
  </div>
</header>

<div class="container">
  <!-- SUBMIT -->
  <div id="sec-submit" class="section active">
    <div class="card">
      <h2>💬 質問を投稿する</h2>
      <label class="check-row mb10">
        <input type="checkbox" id="chk-anon" onchange="toggleAnon()">
        匿名で投稿する
      </label>
      <div id="name-row" class="mb12">
        <input type="text" id="inp-name" placeholder="お名前（任意）" maxlength="30">
      </div>
      <textarea id="inp-text" placeholder="質問を入力してください..." maxlength="300" oninput="updateCounter()"></textarea>
      <div class="counter"><span id="char-count">0</span>/300</div>
      <div class="success-msg" id="success-msg">✅ 質問を投稿しました！</div>
      <button class="btn" id="submit-btn" onclick="submitQ()" disabled>送信する 🚀</button>
      <div class="qr-section">
        <div id="qrcode"></div>
        <div class="qr-label" id="qr-label" style="font-size:12px;color:#888;text-align:center">QRコードを生成中...</div>
      </div>
    </div>
  </div>

  <!-- BOARD -->
  <div id="sec-board" class="section">
    <div class="filters">
      <button class="tab active" id="f-new" onclick="setFilter('new')">🕐 新着</button>
      <button class="tab" id="f-popular" onclick="setFilter('popular')">🔥 人気</button>
      <button class="tab" id="f-answered" onclick="setFilter('answered')">✅ 回答済み</button>
      <span class="filter-right" id="unanswered-count"></span>
    </div>
    <div id="board-list"><div class="loading"><span class="spinner"></span>読み込み中...</div></div>
  </div>

  <!-- ADMIN -->
  <div id="sec-admin" class="section">
    <div id="admin-login" class="card">
      <h2>🔒 管理者ログイン</h2>
      <input type="password" id="admin-pass" placeholder="パスワードを入力" class="mb12" onkeydown="if(event.key==='Enter')adminLogin()">
      <div class="error-msg" id="admin-error"></div>
      <br><br>
      <button class="btn" onclick="adminLogin()">ログイン</button>
      <p style="font-size:12px;color:#888;margin-top:8px;text-align:center">デフォルト: admin1234</p>
    </div>
    <div id="admin-panel" style="display:none">
      <div class="admin-header">
        <h2 style="margin:0;font-size:18px">🛠 管理パネル — <span id="admin-count">0</span>件</h2>
        <button class="btn-sm btn-danger" onclick="clearAll()">全削除</button>
      </div>
      <div id="admin-list"></div>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxugosQF7Uihe03dP5nwrddybe92nbHZs2A_m-vmZ2KBy-0JXJagrSGUUOydBfRx9sy/exec";
const ADMIN_PASS = "admin1234";

let questions = [];
let liked = JSON.parse(localStorage.getItem("qa-liked") || "[]");
let adminUnlocked = false;
let currentFilter = "new";
let currentTab = "submit";

async function api(params) {
  const url = API + "?" + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function loadQuestions() {
  try {
    questions = await api({ action: "get" });
    updateTabCount();
    if (currentTab === "board") renderBoard();
    if (currentTab === "admin" && adminUnlocked) renderAdmin();
  } catch(e) { console.error(e); }
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById("sec-" + tab).classList.add("active");
  document.querySelectorAll("header .tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  if (tab === "board") { loadQuestions(); }
  if (tab === "admin" && adminUnlocked) renderAdmin();
}

function toggleAnon() {
  document.getElementById("name-row").style.display = document.getElementById("chk-anon").checked ? "none" : "block";
}
function updateCounter() {
  const v = document.getElementById("inp-text").value;
  document.getElementById("char-count").textContent = v.length;
  document.getElementById("submit-btn").disabled = v.trim() === "";
}

async function submitQ() {
  const anon = document.getElementById("chk-anon").checked;
  const name = anon ? "匿名" : (document.getElementById("inp-name").value.trim() || "名無し");
  const text = document.getElementById("inp-text").value.trim();
  if (!text) return;
  document.getElementById("submit-btn").disabled = true;
  await api({ action: "add", name, text });
  document.getElementById("inp-text").value = "";
  document.getElementById("char-count").textContent = "0";
  updateTabCount();
  const msg = document.getElementById("success-msg");
  msg.classList.add("show");
  setTimeout(() => { msg.classList.remove("show"); document.getElementById("submit-btn").disabled = false; }, 3000);
}

function updateTabCount() {
  document.getElementById("tab-board").textContent = "ボード (" + questions.length + ")";
}

function setFilter(f) {
  currentFilter = f;
  ["new","popular","answered"].forEach(x => document.getElementById("f-"+x).classList.toggle("active", x===f));
  renderBoard();
}

function renderBoard() {
  const sorted = [...questions].sort((a,b) => {
    if (currentFilter === "popular") return b.likes - a.likes;
    if (currentFilter === "answered") return (b.answered=="TRUE"||b.answered===true?1:0)-(a.answered=="TRUE"||a.answered===true?1:0);
    return 0;
  });
  const unanswered = questions.filter(q => q.answered!="TRUE" && q.answered!==true).length;
  document.getElementById("unanswered-count").textContent = "未回答 " + unanswered + "件";
  const el = document.getElementById("board-list");
  if (sorted.length === 0) { el.innerHTML = '<div class="empty">まだ質問はありません 🙌</div>'; return; }
  const isAnswered = q => q.answered=="TRUE" || q.answered===true;
  el.innerHTML = sorted.map(q => `
    <div class="q-card ${isAnswered(q)?"answered":""}">
      <div class="q-meta">
        <span class="badge ${isAnswered(q)?"answered":""}">${isAnswered(q)?"✅ 回答済み":"💬 未回答"}</span>
        <span class="q-time">${q.ts}</span>
      </div>
      <div class="q-text">${escHtml(q.text)}</div>
      <div class="q-footer">
        <span class="q-author">— ${escHtml(q.name)}</span>
        <button class="like-btn ${liked.includes(q.id)?"liked":""}" onclick="toggleLike('${q.id}')" ${liked.includes(q.id)?"disabled":""}>
          👍 ${q.likes}
        </button>
      </div>
    </div>`).join("");
}

async function toggleLike(id) {
  if (liked.includes(id)) return;
  liked.push(id);
  localStorage.setItem("qa-liked", JSON.stringify(liked));
  await api({ action: "like", id });
  await loadQuestions();
}

function adminLogin() {
  if (document.getElementById("admin-pass").value === ADMIN_PASS) {
    adminUnlocked = true;
    document.getElementById("admin-login").style.display = "none";
    document.getElementById("admin-panel").style.display = "block";
    loadQuestions();
  } else {
    document.getElementById("admin-error").textContent = "パスワードが違います";
  }
}

function renderAdmin() {
  document.getElementById("admin-count").textContent = questions.length;
  const el = document.getElementById("admin-list");
  const isAnswered = q => q.answered=="TRUE" || q.answered===true;
  if (questions.length === 0) { el.innerHTML = '<div class="empty">質問はありません</div>'; return; }
  el.innerHTML = questions.map(q => `
    <div class="q-card ${isAnswered(q)?"answered":""}">
      <div class="q-meta">
        <span style="font-size:13px;color:#a78bfa">${escHtml(q.name)} · ${q.ts} · 👍 ${q.likes}</span>
        <div class="admin-actions">
          <button class="btn-sm ${isAnswered(q)?"":"btn-success"}" onclick="toggleAnswered('${q.id}','${isAnswered(q)}')">${isAnswered(q)?"未回答に戻す":"回答済み ✅"}</button>
          <button class="btn-sm btn-danger" onclick="deleteQ('${q.id}')">削除</button>
        </div>
      </div>
      <div class="q-text">${escHtml(q.text)}</div>
    </div>`).join("");
}

async function toggleAnswered(id, current) {
  await api({ action: "answer", id, val: current=="true"||current==true ? "false" : "true" });
  await loadQuestions();
}

async function deleteQ(id) {
  await api({ action: "delete", id });
  await loadQuestions();
}

async function clearAll() {
  if (confirm("全質問を削除しますか？")) {
    await api({ action: "clear" });
    await loadQuestions();
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// QR
window.addEventListener("load", () => {
  const url = location.href;
  const el = document.getElementById("qrcode");
  el.innerHTML = "";
  try {
    new QRCode(el, { text: url, width: 140, height: 140, colorDark:"#000", colorLight:"#fff", correctLevel: QRCode.CorrectLevel.M });
    document.getElementById("qr-label").textContent = "このURLをスキャンして参加";
  } catch(e) {
    document.getElementById("qr-label").textContent = url;
  }
  loadQuestions();
});

setInterval(() => { loadQuestions(); }, 5000);
</script>
</body>
</html>
